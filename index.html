<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Editor | 🌙 Fix View</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { --bg: #0b0e14; --accent: #3498db; --side: #1c232d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: sans-serif; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* الهيدر صغرناه عشان نعطي مساحة */
        .navbar { height: 40px; background: var(--side); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #333; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 12px; color: var(--accent); }

        /* منطقة المحرر - جعلناها مرنة جداً */
        .editor-wrapper { flex: 1; position: relative; width: 100%; background: var(--bg); display: flex; flex-direction: column; }
        #editor { flex: 1; width: 100%; height: 100%; }

        /* شريط الأدوات السريع (مهم جداً للرؤية) */
        .toolbar { 
            display: flex; background: #252526; padding: 5px; gap: 5px; 
            overflow-x: auto; border-top: 1px solid #444; flex-shrink: 0;
            white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .tool-btn { background: #3e3e3e; color: white; border: none; padding: 10px 18px; border-radius: 6px; font-size: 18px; font-family: monospace; }

        /* لوحة التحكم السفلية */
        .ai-panel { background: var(--side); padding: 10px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .ai-input { width: 100%; background: #0b0e14; color: white; border: 1px solid #444; border-radius: 8px; padding: 12px; font-size: 15px; outline: none; }
        
        .btn-row { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; color: white; cursor: pointer; }
        .btn-blue { background: var(--accent); }
        .btn-green { background: #27ae60; }

        /* حل مشكلة الاختفاء خلف الكيبورد في الآيباد */
        @media (max-width: 1024px) {
            .editor-wrapper { height: auto; min-height: 200px; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="font-size: 10px;">Zero Dev</div>
        <div class="logo">🌙 MOON EDITOR</div>
        <div id="api-stat" style="color: #ff4757;">●</div>
    </div>

    <div class="editor-wrapper">
        <div id="editor"></div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="insertText('\t')">⇥</button>
        <button class="tool-btn" onclick="insertText(':')">:</button>
        <button class="tool-btn" onclick="insertText('.')">.</button>
        <button class="tool-btn" onclick="insertText('(')">(</button>
        <button class="tool-btn" onclick="insertText(')')">)</button>
        <button class="tool-btn" onclick="insertText('\"')">"</button>
        <button class="tool-btn" onclick="insertText('=')">=</button>
        <button class="tool-btn" onclick="insertText('[')">[</button>
        <button class="tool-btn" onclick="insertText(']')">]</button>
    </div>

    <div class="ai-panel">
        <input type="text" id="cmd" class="ai-input" placeholder="وش نعدل في الكود؟">
        <div class="btn-row">
            <button class="btn btn-blue" onclick="runSmartAI()">تعديل ذكي ✨</button>
            <button class="btn btn-green" onclick="copy()">نسخ 📋</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <script>
        const KEY = localStorage.getItem('moon_editor_api_key') || "";
        if(KEY) document.getElementById('api-stat').style.color = "#2ed573";

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: "-- الصق الكود هنا وجرب التعديل\n",
                language: 'lua',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 17, // خط كبير وواضح
                wordWrap: "on",
                lineNumbers: "on",
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                fixedOverflowWidgets: true, // يمنع القوائم من الخروج برا الشاشة
                contextmenu: false // يعطل قائمة اليمين اللي تخرب في اللمس
            });

            // يخلي الصفحة تنزل للسطر اللي تكتب فيه تلقائياً
            window.editor.onDidChangeCursorPosition((e) => {
                window.editor.revealPositionInCenterIfOutsideViewport(e.position);
            });
        });

        async function runSmartAI() {
            const prompt = document.getElementById('cmd').value;
            const code = window.editor.getValue();
            if(!KEY) return alert("سجل المفتاح أولاً");
            if(!prompt) return;

            document.querySelector('.btn-blue').innerText = "...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are a Luau assistant. Rewrite or fix the code. Output ONLY the code." },
                            { role: "user", content: `Request: ${prompt}\n\nCode:\n${code}` }
                        ]
                    })
                });
                const d = await res.json();
                window.editor.setValue(d.choices[0].message.content.trim());
            } catch (e) { alert("Error"); }
            document.querySelector('.btn-blue').innerText = "تعديل ذكي ✨";
        }

        function insertText(t) {
            const sel = window.editor.getSelection();
            window.editor.executeEdits("", [{ range: sel, text: t, forceMoveMarkers: true }]);
            window.editor.focus();
        }

        function copy() {
            navigator.clipboard.writeText(window.editor.getValue());
            alert("تم النسخ!");
        }
    </script>
</body>
</html>
