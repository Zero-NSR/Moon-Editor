<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Editor | 🌙 View Fix</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { --bg: #0b0e14; --accent: #3498db; }
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; background: var(--bg); color: white; 
            font-family: sans-serif; height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden;
        }

        /* الهيدر */
        .navbar { height: 40px; background: #1a1f26; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        .logo { font-weight: bold; font-size: 14px; color: var(--accent); letter-spacing: 2px; }

        /* منطقة المحرر - أعطيناها الأولوية القصوى */
        .editor-frame { 
            flex: 1; 
            position: relative; 
            width: 100%; 
            background: #000; 
            z-index: 1; /* لضمان ظهوره فوق الخلفية */
        }
        #editor { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        /* شريط الأدوات السريع */
        .toolbar { 
            display: flex; background: #1e1e1e; padding: 8px; gap: 6px; 
            overflow-x: auto; border-top: 1px solid #444; flex-shrink: 0; z-index: 10;
        }
        .tool-btn { background: #333; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 18px; font-weight: bold; }

        /* لوحة التحكم - جعلناها نحيفة لترك مساحة للكود */
        .control-panel { 
            background: #151921; padding: 12px; 
            display: flex; flex-direction: column; gap: 10px; 
            flex-shrink: 0; border-top: 2px solid var(--accent); z-index: 10;
        }
        .ai-box { 
            width: 100%; background: #000; color: #00ff00; 
            border: 1px solid #444; border-radius: 8px; 
            padding: 12px; font-size: 16px; outline: none; 
        }
        
        .btns { display: flex; gap: 10px; }
        .b { flex: 1; padding: 15px; border: none; border-radius: 8px; font-weight: bold; color: white; font-size: 16px; }
        .b-ai { background: var(--accent); }
        .b-copy { background: #27ae60; }

        /* منع اختفاء الكود في الجوال */
        @media (max-width: 768px) {
            .editor-frame { min-height: 50vh; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">🌙 MOON EDITOR</div>
    </div>

    <div class="editor-frame">
        <div id="editor"></div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="add('\t')">TAB</button>
        <button class="tool-btn" onclick="add(':')">:</button>
        <button class="tool-btn" onclick="add('.')">.</button>
        <button class="tool-btn" onclick="add('(')">(</button>
        <button class="tool-btn" onclick="add(')')">)</button>
        <button class="tool-btn" onclick="add('=')">=</button>
        <button class="tool-btn" onclick="add('\"')">"</button>
    </div>

    <div class="control-panel">
        <input type="text" id="aiCmd" class="ai-box" placeholder="اطلب تعديل.. (مثلاً: صلح الكود)">
        <div class="btns">
            <button class="b b-ai" onclick="fix()">تعديل ذكي ✨</button>
            <button class="b b-copy" onclick="cp()">نسخ 📋</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <script>
        const API_KEY = localStorage.getItem('moon_editor_api_key') || "";

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: "-- الكود سيظهر هنا بوضوح\nprint('Moon Editor Active')\n\n",
                language: 'lua',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 18,
                wordWrap: "on",
                lineNumbers: "on",
                scrollBeyondLastLine: false,
                minimap: { enabled: false }
            });

            // تحديث الحجم فوراً عند الفتح
            setTimeout(() => { window.editor.layout(); }, 500);
        });

        async function fix() {
            const cmd = document.getElementById('aiCmd').value;
            const code = window.editor.getValue();
            if(!API_KEY) return alert("سجل المفتاح أولاً");
            if(!cmd) return;

            document.querySelector('.b-ai').innerText = "جاري الإصلاح...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "system", content: "You are a Luau expert. Fix or modify the code. Return ONLY the code." },
                            { role: "user", content: `Command: ${cmd}\n\nCode:\n${code}` }
                        ]
                    })
                });
                const d = await res.json();
                window.editor.setValue(d.choices[0].message.content.trim());
            } catch (e) { alert("Error"); }
            document.querySelector('.b-ai').innerText = "تعديل ذكي ✨";
        }

        function add(t) {
            const sel = window.editor.getSelection();
            window.editor.executeEdits("", [{ range: sel, text: t, forceMoveMarkers: true }]);
            window.editor.focus();
        }

        function cp() {
            navigator.clipboard.writeText(window.editor.getValue());
            alert("تم النسخ!");
        }

        // تحديث الحجم عند تدوير الآيباد
        window.addEventListener('resize', () => { window.editor.layout(); });
    </script>
</body>
</html>
