<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Editor | 🌙 AI</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { --bg: #0b0e14; --side: #151921; --accent: #3498db; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .navbar { height: 55px; background: var(--side); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #2d3436; }
        .menu-btn { cursor: pointer; font-size: 24px; color: var(--accent); font-weight: bold; }
        .logo { font-weight: bold; color: #fff; letter-spacing: 1px; }
        .main { display: flex; flex: 1; height: calc(100vh - 55px); }
        #editor { flex: 1; }
        .ai-sidebar { width: 320px; background: var(--side); display: flex; flex-direction: column; padding: 15px; border-left: 1px solid #2d3436; box-sizing: border-box; }
        textarea, .api-input { width: 100%; background: #0b0e14; color: #fff; border: 1px solid #3d444d; border-radius: 8px; padding: 12px; margin-bottom: 10px; box-sizing: border-box; outline: none; font-size: 14px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 8px; transition: 0.2s; }
        .gen { background: var(--accent); color: #fff; }
        .copy { background: #27ae60; color: white; }
        .save-api { background: #444; color: #bbb; font-size: 11px; }
        #status { font-size: 11px; text-align: center; color: #888; margin-top: 5px; }
        @media (max-width: 768px) { 
            .main { flex-direction: column; } 
            .ai-sidebar { width: 100%; height: 45%; border-left: none; border-top: 1px solid #2d3436; } 
            #editor { height: 55%; } 
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="menu-btn">=<br>=<br>=</div>
        <div class="logo">🌙 MOON EDITOR</div>
        <div id="api-indicator" style="font-size: 10px; color: #ff4757;">Key Required ⚠️</div>
    </div>

    <div class="main">
        <div class="ai-sidebar">
            <input type="password" id="apiKeyInput" class="api-input" placeholder="أدخل API Key هنا...">
            <button class="save-api" onclick="saveKey()">حفظ المفتاح في المتصفح 💾</button>
            <textarea id="prompt" placeholder="اكتب برومت (مثلاً: كود طيران)"></textarea>
            <button class="gen" onclick="generateCode()">توليد الكود ✨</button>
            <button class="copy" onclick="copyAll()">نسخ السكربت 📋</button>
            <p id="status">جاهز</p>
        </div>
        <div id="editor"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <script>
        let savedKey = localStorage.getItem('moon_editor_api_key') || "";
        if(savedKey) {
            document.getElementById('api-indicator').innerText = "AI Ready ✅";
            document.getElementById('api-indicator').style.color = "#2ed573";
        }

        function saveKey() {
            const key = document.getElementById('apiKeyInput').value;
            if(key) {
                localStorage.setItem('moon_editor_api_key', key);
                alert("تم الحفظ!");
                location.reload();
            }
        }

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: "-- Moon Editor\n-- Welcome Zero Dev\n\n",
                language: 'lua', theme: 'vs-dark', automaticLayout: true, fontSize: 14
            });
        });

        async function generateCode() {
            if(!savedKey) return alert("احفظ المفتاح أولاً!");
            const p = document.getElementById('prompt').value;
            const s = document.getElementById('status');
            if(!p) return;
            s.innerText = "جاري التوليد...";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${savedKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: "Roblox Luau expert. Return only code. No talk." }, { role: "user", content: p }]
                    })
                });
                const d = await res.json();
                const code = d.choices[0].message.content.replace(/```lua|```/g, "");
                window.editor.setValue(window.editor.getValue() + "\n-- AI Generated:\n" + code);
                s.innerText = "تم! ✅";
            } catch (e) { s.innerText = "خطأ!"; }
        }

        function copyAll() { navigator.clipboard.writeText(window.editor.getValue()); alert("تم النسخ!"); }
    </script>
</body>
</html>
