<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Editor | 🌙</title>
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/editor/editor.main.min.css">
    <style>
        :root { --bg: #0b0e14; --side: #151921; --accent: #3498db; --text: #e0e0e0; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        .navbar { height: 50px; background: var(--side); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #2d3436; flex-shrink: 0; }
        .logo { font-weight: bold; color: #fff; font-size: 0.9rem; }

        .main { display: flex; flex: 1; overflow: hidden; }
        #editor { flex: 1; height: 100%; }

        /* تعديل لوحة الـ AI لتناسب الشاشات الصغيرة */
        .ai-sidebar { width: 300px; background: var(--side); display: flex; flex-direction: column; padding: 10px; border-left: 1px solid #2d3436; overflow-y: auto; }
        
        input, textarea { width: 100%; background: #0b0e14; color: #fff; border: 1px solid #3d444d; border-radius: 6px; padding: 8px; margin-bottom: 8px; font-size: 13px; outline: none; }
        button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 5px; font-size: 12px; }
        
        .gen { background: var(--accent); color: white; }
        .copy { background: #27ae60; color: white; }

        /* شريط الأدوات السريع للكيبورد */
        .toolbar { display: none; background: #252526; padding: 5px; gap: 5px; overflow-x: auto; border-top: 1px solid #333; }
        .tool-btn { background: #333; color: white; padding: 5px 12px; border-radius: 4px; font-size: 14px; border: none; }

        @media (max-width: 768px) {
            .main { flex-direction: column-reverse; } /* المحرر فوق والـ AI تحت */
            .ai-sidebar { width: 100%; height: auto; max-height: 35%; border-left: none; border-top: 1px solid #2d3436; }
            .toolbar { display: flex; }
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="color:var(--accent); cursor:pointer" onclick="toggleAI()">≡</div>
        <div class="logo">🌙 MOON EDITOR</div>
        <div id="api-indicator" style="font-size: 8px; color: #ff4757;">Key Required ⚠️</div>
    </div>

    <div class="main">
        <div id="editor"></div>
        <div class="ai-sidebar" id="aiSidebar">
            <input type="password" id="apiKeyInput" placeholder="API Key...">
            <button style="font-size:10px; background:#444; color:#ccc" onclick="saveKey()">حفظ المفتاح 💾</button>
            <textarea id="prompt" rows="2" placeholder="اطلب كود..."></textarea>
            <button class="gen" onclick="generateCode()">توليد ✨</button>
            <button class="copy" onclick="copyAll()">نسخ 📋</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" onclick="insertText('\t')">TAB</button>
        <button class="tool-btn" onclick="insertText('(')">(</button>
        <button class="tool-btn" onclick="insertText(')')">)</button>
        <button class="tool-btn" onclick="insertText(':')">:</button>
        <button class="tool-btn" onclick="insertText('.')">.</button>
        <button class="tool-btn" onclick="insertText('\"')">"</button>
        <button class="tool-btn" onclick="insertText('=')">=</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs/loader.min.js"></script>
    <script>
        let savedKey = localStorage.getItem('moon_editor_api_key') || "";
        if(savedKey) { document.getElementById('api-indicator').innerText = "AI Ready ✅"; document.getElementById('api-indicator').style.color = "#2ed573"; }

        function saveKey() {
            const key = document.getElementById('apiKeyInput').value;
            if(key) { localStorage.setItem('moon_editor_api_key', key); location.reload(); }
        }

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.33.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            window.editor = monaco.editor.create(document.getElementById('editor'), {
                value: "-- Moon Editor\n", language: 'lua', theme: 'vs-dark', automaticLayout: true, fontSize: 14, minimap: { enabled: false }
            });
        });

        function insertText(text) {
            const selection = window.editor.getSelection();
            const id = { major: 1, minor: 1 };
            const op = { identifier: id, range: selection, text: text, forceMoveMarkers: true };
            window.editor.executeEdits("my-source", [op]);
            window.editor.focus();
        }

        function toggleAI() {
            const side = document.getElementById('aiSidebar');
            side.style.display = side.style.display === 'none' ? 'flex' : 'none';
        }

        async function generateCode() {
            if(!savedKey) return alert("احفظ المفتاح!");
            const p = document.getElementById('prompt').value;
            if(!p) return;
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${savedKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: "Roblox Luau expert. Code only." }, { role: "user", content: p }] })
                });
                const d = await res.json();
                const code = d.choices[0].message.content.replace(/```lua|```/g, "");
                window.editor.setValue(window.editor.getValue() + "\n" + code);
            } catch (e) { alert("خطأ!"); }
        }

        function copyAll() { navigator.clipboard.writeText(window.editor.getValue()); alert("تم النسخ!"); }
    </script>
</body>
</html>
